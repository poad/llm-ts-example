packages:
  - ./common/core
  - ./common/backend/core
  - ./common/backend/langchain
  - ./basic/cdk
  - ./basic/app
  - ./basic/cdk/function
  - ./rag/batch
  - ./rag/app
  - ./rag/cdk
  - ./rag/cdk/function
  - ./agents/agent-ai-sdk
  - ./agents/agent-claude-agent-sdk
  - ./agents/agent-deepagents
  - ./agents/agent-langchain
  - ./agents/agent-langchain-nextjs
  - ./agents/agent-strands
  - ./mcp/servers/postgresql-http
  - ./mcp/servers/weather
  - ./mcp/servers/weather-http
  - ./mcp/servers/resource-mcp-server
  - ./mcp/clients/mcp-client-typescript
  - ./chat-app

allowBuilds:
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@typescript/native-preview@7.0.0-dev.20260418.1'
  - '@typescript/*'
  - '@strands-agents/sdk@1.0.0'
  - '@anthropic-ai/sdk@0.91.1'
  - ip-address@10.1.1
  - fast-xml-builder@1.1.7
  - fast-uri@3.1.2
  - hono@4.12.18

  - '@next/*'
  - next@16.2.6

  - mermaid@11.15.0
  - '@mermaid-js/parser@1.1.1'

  - '@opentelemetry/*'
  - protobufjs@8.0.2
  - ws@8.20.1

overrides:
  '@anthropic-ai/sdk@>=0.79.0 <0.91.1': ^0.91.1
  '@opentelemetry/auto-instrumentations-node@<0.75.0': ^0.75.0
  '@opentelemetry/exporter-prometheus@<0.217.0': ^0.217.0
  '@opentelemetry/sdk-node@<0.217.0': ^0.217.0
  '@tootallnate/once@<3.0.1': '>=3.0.1'
  eslint-import-resolver-typescript: '^4.4.4'
  fast-uri@<=3.1.1: ^3.1.2
  fast-xml-builder@<=1.1.6: ^1.1.7
  fast-xml-parser@<5.7.0: '>=5.7.0'
  hono@<4.12.18: ^4.12.18
  ip-address@<=10.1.0: ^10.1.1
  mermaid@>=11.0.0-alpha.1 <=11.14.0: ^11.14.1
  next@>=16.0.0 <16.2.6: ^16.2.6
  postcss@<8.5.10: ^8.5.10
  protobufjs@<7.5.5: '>=7.5.5'
  protobufjs@>=8.0.0 <8.0.1: '>=8.0.1'
  protobufjs@>=8.0.0 <=8.0.1: ^8.0.2
  semver: '>=7'
  uuid@<14.0.0: '>=14.0.0'
  ws@>=8.0.0 <8.20.1: ^8.20.1

strictPeerDependencies: false

trustPolicy: no-downgrade
