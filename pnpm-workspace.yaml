packages:
  - ./common/core
  - ./common/backend/core
  - ./common/backend/langchain
  - ./basic/cdk
  - ./basic/app
  - ./basic/cdk/function
  - ./rag/batch
  - ./rag/app
  - ./rag/cdk
  - ./rag/cdk/function
  - ./agents/agent-ai-sdk
  - ./agents/agent-claude-agent-sdk
  - ./agents/agent-deepagents
  - ./agents/agent-langchain
  - ./agents/agent-langchain-nextjs
  - ./agents/agent-strands
  - ./mcp/mcp-client-http
  - ./mcp/servers/postgresql-http
  - ./mcp/servers/weather
  - ./mcp/servers/weather-http
  - ./mcp/servers/resource-mcp-server
  - ./mcp/clients/mcp-client-typescript
  - ./chat-app

allowBuilds:
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@typescript/native-preview@7.0.0-dev.20260418.1'
  - '@typescript/*'

  - pnpm@11.7.0
  - esbuild@0.28.1
  - '@esbuild/aix-ppc64@0.28.1'
  - '@esbuild/android-arm64@0.28.1'
  - '@esbuild/android-arm@0.28.1'
  - '@esbuild/android-x64@0.28.1'
  - '@esbuild/darwin-arm64@0.28.1'
  - '@esbuild/darwin-x64@0.28.1'
  - '@esbuild/freebsd-arm64@0.28.1'
  - '@esbuild/freebsd-x64@0.28.1'
  - '@esbuild/linux-arm64@0.28.1'
  - '@esbuild/linux-arm@0.28.1'
  - '@esbuild/linux-ia32@0.28.1'
  - '@esbuild/linux-loong64@0.28.1'
  - '@esbuild/linux-mips64el@0.28.1'
  - '@esbuild/linux-ppc64@0.28.1'
  - '@esbuild/linux-riscv64@0.28.1'
  - '@esbuild/linux-s390x@0.28.1'
  - '@esbuild/linux-x64@0.28.1'
  - '@esbuild/netbsd-arm64@0.28.1'
  - '@esbuild/netbsd-x64@0.28.1'
  - '@esbuild/openbsd-arm64@0.28.1'
  - '@esbuild/openbsd-x64@0.28.1'
  - '@esbuild/openharmony-arm64@0.28.1'
  - '@esbuild/sunos-x64@0.28.1'
  - '@esbuild/win32-arm64@0.28.1'
  - '@esbuild/win32-ia32@0.28.1'
  - '@esbuild/win32-x64@0.28.1'

  - protobufjs@8.6.3
  - '@opentelemetry/sdk-node@0.217.0'
  - '@opentelemetry/exporter-prometheus@0.217.0'
  - form-data@2.5.6
  - '@opentelemetry/core@2.8.0'

overrides:
  '@opentelemetry/core@<2.8.0': ^2.8.0
  '@opentelemetry/exporter-prometheus@<0.217.0': ^0.217.0
  '@opentelemetry/sdk-node@<0.217.0': ^0.217.0
  esbuild@>=0.17.0 <0.28.1: ^0.28.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  eslint-import-resolver-typescript: '^4.4.5'
  form-data@<2.5.6: ^2.5.6
  postcss@<8.5.10: ^8.5.10
  protobufjs: ^8.6.3
  semver: '>=7'
  uuid@<11.1.1: ^14

strictPeerDependencies: false

trustPolicy: no-downgrade
