packages:
  - ./common/core
  - ./common/backend/core
  - ./common/backend/langchain
  - ./basic/cdk
  - ./basic/app
  - ./basic/cdk/function
  - ./rag/batch
  - ./rag/app
  - ./rag/cdk
  - ./rag/cdk/function
  - ./agents/agent-ai-sdk
  - ./agents/agent-claude-agent-sdk
  - ./agents/agent-deepagents
  - ./agents/agent-langchain
  - ./agents/agent-langchain-nextjs
  - ./agents/agent-strands
  - ./mcp/mcp-client-http
  - ./mcp/servers/postgresql-http
  - ./mcp/servers/weather
  - ./mcp/servers/weather-http
  - ./mcp/servers/resource-mcp-server
  - ./mcp/clients/mcp-client-typescript
  - ./chat-app

allowBuilds:
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@typescript/native-preview@7.0.0-dev.20260418.1'
  - '@typescript/*'

  - pnpm@11.5.2

overrides:
  '@opentelemetry/exporter-prometheus@<0.217.0': ^0.218.0
  '@opentelemetry/sdk-node@<0.217.0': ^0.218.0
  eslint-import-resolver-typescript: '^4.4.4'
  postcss@<8.5.10: ^8.5.10
  protobufjs: ^8
  semver: '>=7'
  uuid@<11.1.1: ^14

strictPeerDependencies: false

trustPolicy: no-downgrade
